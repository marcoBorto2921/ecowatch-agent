name: EcoWatch Weekly Digest

on:
  schedule:
    # Ogni lunedì alle 8:00 UTC (9:00 ora italiana)
    - cron: '0 8 * * 1'
  
  # Permette di eseguirlo manualmente da GitHub
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Scarica il codice dal repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installa Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installa le dipendenze
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Esegui la digest
      - name: Run weekly digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -c "from tools.weekly_digest import generate_weekly_digest; generate_weekly_digest()"